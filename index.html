<title>SecureVault</title>
<style>
:root{--bg:#f7f8f7;--surface:#fff;--surface-2:#f1f4f1;--border:#e7ebe7;--text:#0f1a14;--text-2:#3a4a40;--muted:#8a9690;--primary:#16a34a;--primary-2:#15803d;--primary-soft:#dcfce7;--primary-tint:#ecfdf3;--accent-green:#22c55e;--danger:#dc2626;--warn:#f59e0b;--shadow-sm:0 1px 2px rgba(15,26,20,.04),0 2px 8px rgba(15,26,20,.04);--shadow:0 4px 16px rgba(15,26,20,.06);--shadow-lg:0 20px 50px rgba(15,26,20,.12);--radius:20px;--radius-sm:14px}
[data-theme="dark"]{--bg:#0d1411;--surface:#151c18;--surface-2:#1c2520;--border:#26302a;--text:#e7eef0;--text-2:#c1ccc6;--muted:#8a9690;--primary-soft:rgba(22,163,74,.18);--primary-tint:rgba(22,163,74,.10)}
*{box-sizing:border-box}html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior-y:none}body{min-height:100dvh}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}input,textarea,select{font-family:inherit;font-size:15px}svg{display:block}
.lock-wrap{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
.lock-card{width:100%;max-width:420px;background:var(--surface);border-radius:24px;padding:32px 26px;box-shadow:var(--shadow);text-align:center;border:1px solid var(--border)}
.lock-logo{width:72px;height:72px;border-radius:22px;display:inline-flex;align-items:center;justify-content:center;background:var(--primary);color:#fff;margin-bottom:16px;box-shadow:0 10px 24px rgba(22,163,74,.28)}
.lock-card h1{margin:6px 0 4px;font-size:24px;font-weight:800;letter-spacing:-.5px}
.lock-card p{margin:0 0 22px;color:var(--muted);font-size:14px}
.field{display:flex;flex-direction:column;gap:6px;text-align:left;margin-bottom:14px}
.field label{font-size:12.5px;color:var(--muted);font-weight:600}
.input{display:flex;align-items:center;gap:8px;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:12px 14px;transition:border-color .15s}
.input:focus-within{border-color:var(--primary)}
.input input,.input textarea,.input select{flex:1;background:transparent;border:0;outline:none;color:var(--text);min-width:0}
.input textarea{resize:vertical;font-family:inherit}
.iconbtn{background:transparent;color:var(--muted);padding:6px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center}
.iconbtn:hover{color:var(--primary);background:var(--primary-soft)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--surface);color:var(--text);padding:11px 18px;border-radius:999px;font-weight:600;font-size:14px;transition:all .15s;border:1.5px solid var(--border)}
.btn:hover{border-color:var(--primary);color:var(--primary)}
.btn.primary{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 6px 16px rgba(22,163,74,.25)}
.btn.primary:hover{background:var(--primary-2);border-color:var(--primary-2);color:#fff;transform:translateY(-1px)}
.btn.danger{color:var(--danger);border-color:transparent;background:rgba(220,38,38,.08)}
.btn.ghost{background:transparent;border-color:transparent}
.btn.block{width:100%}.btn.mini{padding:7px 13px;font-size:12.5px;border-radius:999px}
.row{display:flex;gap:8px;flex-wrap:wrap}.small{font-size:12px;color:var(--muted)}
.err{color:var(--danger);font-size:13px;margin-top:6px;text-align:left}.hidden{display:none!important}
.app{display:none;min-height:100dvh;flex-direction:column;padding-bottom:calc(110px + env(safe-area-inset-bottom));background:var(--bg)}
.header{padding:22px 20px 0;padding-top:calc(22px + env(safe-area-inset-top));max-width:980px;margin:0 auto;width:100%}
.header-top{display:flex;align-items:center;gap:8px;margin-bottom:18px}.header-top .spacer{flex:1}
.iconbtn-top{width:42px;height:42px;border-radius:14px;background:var(--surface);color:var(--text);display:inline-flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);transition:all .15s;border:1px solid var(--border)}
.iconbtn-top:hover{color:var(--primary);border-color:var(--primary)}
.title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px}
.page-title{font-size:30px;font-weight:800;letter-spacing:-.8px;line-height:1.1}
.page-sub{color:var(--muted);font-size:14px;margin-bottom:18px}
.title-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.add-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:999px;background:var(--surface);color:var(--primary);font-weight:700;font-size:14px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.add-btn:hover{background:var(--primary-tint);border-color:var(--primary)}
.folder-btn{width:44px;height:44px;border-radius:14px;background:var(--primary-soft);display:inline-flex;align-items:center;justify-content:center;color:var(--primary)}
.filter-pills{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.pill{padding:10px 22px;border-radius:999px;background:var(--surface);color:var(--text-2);font-size:14px;font-weight:600;border:1.5px solid transparent;box-shadow:var(--shadow-sm);transition:all .15s}
.pill.active{border-color:var(--primary);color:var(--primary)}.pill:hover{color:var(--primary)}
.hero-card{background:var(--surface);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);margin-bottom:18px;border:1px solid var(--border)}
.hero-card .lab{color:var(--muted);font-size:12px;font-weight:700;letter-spacing:1px}
.hero-card .big{font-size:32px;font-weight:800;letter-spacing:-.8px;margin:6px 0 4px;display:flex;align-items:center;gap:10px}
.hero-card .big .eye{margin-left:auto;color:var(--muted);cursor:pointer;display:inline-flex}
.hero-card .sub{color:var(--muted);font-size:13px}
.insight-row{display:grid;grid-template-columns:1.4fr 1fr;gap:12px;margin-bottom:20px}
@media(max-width:640px){.insight-row{grid-template-columns:1fr}}
.insight-card{background:var(--surface);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-sm);border:1px solid var(--border);position:relative;overflow:hidden}
.insight-card .quote{position:absolute;left:14px;top:6px;color:var(--primary);opacity:.3;font-size:54px;line-height:1;font-family:Georgia,serif;font-weight:700}
.insight-card .insight-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-left:32px}
.insight-card .insight-head .t{color:var(--primary);font-weight:800;font-size:13px;letter-spacing:1px}
.insight-card .insight-head .link{color:var(--muted);font-size:12px;font-weight:600;display:flex;align-items:center;gap:4px;cursor:pointer}
.insight-card .insight-head .link:hover{color:var(--primary)}
.insight-card .insight-body{font-size:13.5px;line-height:1.55;color:var(--text-2);padding-left:32px}
.insight-card .insight-body b{color:var(--text)}
.daily-card{background:var(--surface);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.daily-card .t{color:var(--muted);font-size:12px;font-weight:700;letter-spacing:1px;margin-bottom:10px}
.mini-bars{display:flex;align-items:flex-end;gap:6px;height:64px;margin:8px 0 4px}
.mini-bar{flex:1;background:var(--primary-soft);border-radius:4px;display:flex;align-items:flex-end;min-height:6px}
.mini-bar .mb{width:100%;background:var(--primary);border-radius:4px;min-height:6px;transition:height .4s}
.mini-bar.active .mb{background:var(--primary-2)}
.mini-labels{display:flex;justify-content:space-between;color:var(--muted);font-size:10.5px;font-weight:600;margin-top:4px}
.mini-labels span{flex:1;text-align:center}
.section-head{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 12px}
.section-head .t{font-weight:700;font-size:15px}.section-head .a{font-size:13px;color:var(--muted);font-weight:600}
.search{background:var(--surface);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-sm);border:1.5px solid transparent;margin-bottom:14px}
.search:focus-within{border-color:var(--primary)}
.search input{flex:1;border:0;outline:none;background:transparent;color:var(--text);min-width:0;font-size:14.5px}
.search svg{color:var(--muted)}
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 14px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:8px 16px;border-radius:999px;background:var(--surface);color:var(--text-2);font-size:13px;font-weight:600;box-shadow:var(--shadow-sm);border:1.5px solid transparent}
.chip.active{border-color:var(--primary);color:var(--primary)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
@media(min-width:760px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1024px){.grid{grid-template-columns:repeat(4,1fr)}}
.card{position:relative;border-radius:var(--radius);padding:18px;color:#fff;display:flex;flex-direction:column;gap:8px;min-height:170px;transition:transform .18s,box-shadow .18s;overflow:hidden;box-shadow:var(--shadow-sm)}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.card .top{display:flex;align-items:center;gap:10px}
.card .favicon{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex:0 0 36px;overflow:hidden;color:#fff}
.card .favicon img{width:74%;height:74%;object-fit:contain}
.card .name{font-weight:800;font-size:15.5px;letter-spacing:-.2px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .menu{color:rgba(255,255,255,.85);padding:4px;border-radius:6px;display:inline-flex}
.card .menu:hover{background:rgba(255,255,255,.15)}
.card .sub{font-size:12px;opacity:.88;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .label{color:rgba(255,255,255,.8);font-size:10px;font-weight:700;letter-spacing:1px;margin-top:6px}
.card .strength{height:5px;border-radius:3px;background:rgba(255,255,255,.22);overflow:hidden;margin-top:4px}
.card .strength>span{display:block;height:100%;background:#fff;width:0;transition:width .3s}
.card .strength-label{font-size:11px;font-weight:700;opacity:.95;margin-top:2px}
.card .card-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto}
.card .card-actions .act{background:rgba(255,255,255,.2);color:#fff;padding:6px 10px;border-radius:999px;font-size:11.5px;font-weight:700;display:inline-flex;align-items:center;gap:4px}
.card .card-actions .act:hover{background:rgba(255,255,255,.32)}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty svg{margin:0 auto 12px;opacity:.4;display:block}
.empty .t{font-weight:700;color:var(--text);margin-bottom:4px;font-size:15px}
.bottom-bar{position:fixed;left:0;right:0;bottom:0;z-index:50;padding:10px 14px calc(10px + env(safe-area-inset-bottom));display:flex;align-items:center;gap:10px;justify-content:center;pointer-events:none}
.bottom-nav{background:var(--surface);border-radius:36px;padding:8px;box-shadow:var(--shadow-lg);display:flex;gap:2px;flex:1;max-width:480px;pointer-events:auto;border:1px solid var(--border)}
.bottom-nav .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 4px;border-radius:24px;color:var(--muted);font-size:11px;font-weight:600;transition:all .15s}
.bottom-nav .nav-item.active{background:var(--primary-soft);color:var(--primary)}
.bottom-nav .nav-item svg{width:22px;height:22px}
.fab{width:60px;height:60px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 28px rgba(22,163,74,.35);pointer-events:auto;flex-shrink:0;transition:all .15s}
.fab:hover{background:var(--primary-2);transform:translateY(-2px)}
.fab svg{width:28px;height:28px}
.modal{position:fixed;inset:0;background:rgba(15,26,20,.55);display:none;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
.modal.open{display:flex;animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{background:var(--surface);width:100%;max-width:640px;max-height:94dvh;overflow:auto;border-radius:26px 26px 0 0;padding:22px;padding-bottom:calc(24px + env(safe-area-inset-bottom));box-shadow:var(--shadow-lg);animation:slideUp .25s;border-top:1px solid var(--border)}
@keyframes slideUp{from{transform:translateY(40px)}to{transform:translateY(0)}}
.sheet-handle{width:42px;height:4px;background:var(--border);border-radius:2px;margin:-8px auto 14px}
.sheet h2{margin:0 0 14px;font-size:20px;font-weight:800;letter-spacing:-.4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:520px){.grid2{grid-template-columns:1fr}}
.seed-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:520px){.seed-grid{grid-template-columns:repeat(2,1fr)}}
.seed-word{display:flex;align-items:center;gap:6px;background:var(--surface-2);border-radius:10px;padding:8px 10px}

<body>
<div id="lockScreen" class="lock-wrap"><div class="lock-card"><div class="lock-logo" id="lockLogo"></div><h1 id="lockTitle">Unlock SecureVault</h1><p id="lockSubtitle">Enter your master password</p>
<div id="setupForm" class="hidden"><div class="field"><label>Create master password</label><div class="input"><input id="newPass" type="password" placeholder="At least 8 characters" autocomplete="new-password"/><button class="iconbtn" type="button" data-toggle="newPass"></button></div></div>
<div class="field"><label>Confirm master password</label><div class="input"><input id="newPass2" type="password" placeholder="Re-enter password" autocomplete="new-password"/></div></div>
<div style="height:6px;border-radius:4px;background:var(--surface-2);overflow:hidden"><span id="setupBar" style="display:block;height:100%;width:0;background:var(--danger);transition:.2s"></span></div>
<p class="small" style="text-align:left;margin:10px 0 14px">This password encrypts your vault locally. If you forget it, your data cannot be recovered.</p>
<button class="btn primary block" onclick="createVault()">Create Vault</button><p id="setupErr" class="err"></p></div>
<div id="unlockForm"><div class="field"><label>Master password</label><div class="input"><input id="masterPass" type="password" placeholder="Master password" autocomplete="current-password"/><button class="iconbtn" type="button" data-toggle="masterPass"></button></div></div>
<button class="btn primary block" onclick="unlockVault()">Unlock</button><p id="unlockErr" class="err"></p>
<div class="row" style="justify-content:space-between;margin-top:14px"><button class="btn ghost" onclick="importVault()">Import Backup</button><button class="btn danger" onclick="resetVault()">Reset Vault</button></div>
<input id="importFile" type="file" accept=".json,application/json" class="hidden"/></div></div></div>
<div id="app" class="app"><div class="header"><div class="header-top"><div class="spacer"></div>
<button class="iconbtn-top" onclick="toggleTheme()" id="themeBtn"></button>
<button class="iconbtn-top" onclick="openSettings()" id="settingsBtn"></button>
<button class="iconbtn-top" onclick="lock()" id="lockBtn"></button></div>
<div class="title-row"><div><div class="page-title" id="pageTitle">Vault</div></div>
<div class="title-actions"><button class="folder-btn" onclick="openSettings()" id="folderBtn"></button>
<button class="add-btn" onclick="openEditor()" id="addBtn"><span id="addBtnIcon"></span> Add</button></div></div>

<div class="bottom-bar" id="bottomBar" style="display:none"><div class="bottom-nav" id="bottomNav"></div>
<button class="fab" id="fab" onclick="openEditor()"></button></div>
<div class="modal" id="modal" onclick="if(event.target===this)closeModal()"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>
<script>
'use strict';
const ICONS={shield:'<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 4v6c0 5-3.5 9.5-8 10-4.5-.5-8-5-8-10V6l8-4z"/><path d="M9 12l2 2 4-4"/></svg>',key:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="15" r="4"/><path d="M10.85 12.15L19 4M18 5l2 2M15 8l2 2"/></svg>',coin:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M14.5 9.5c-.5-1-1.5-1.5-2.5-1.5-1.5 0-3 .8-3 2.5s1.5 2 3 2 3 .3 3 2-1.5 2.5-3 2.5c-1.5 0-2.5-.5-3-1.5M12 6v2M12 16v2"/></svg>',note:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M14 3v6h6M8 13h8M8 17h5"/></svg>',chart:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l3-3 3 3 5-5"/></svg>',plus:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',search:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>',eye:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>',eyeOff:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.5 10.5 0 0 1 12 19c-6.5 0-10-7-10-7a18 18 0 0 1 4.06-5.06"/><path d="M9.9 4.24A10 10 0 0 1 12 4c6.5 0 10 7 10 7a18 18 0 0 1-2.16 3.19"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><path d="M2 2l20 20"/></svg>',copy:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>',edit:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>',trash:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>',external:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6M10 14L21 3"/></svg>',lock:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>',settings:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9"/></svg>',sun:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>',folder:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>',refresh:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15.5-6.5L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15.5 6.5L3 16"/><path d="M3 21v-5h5"/></svg>',dice:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8" cy="8" r="1" fill="currentColor"/><circle cx="16" cy="8" r="1" fill="currentColor"/><circle cx="8" cy="16" r="1" fill="currentColor"/><circle cx="16" cy="16" r="1" fill="currentColor"/><circle cx="12" cy="12" r="1" fill="currentColor"/></svg>',chevR:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>',more:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="5" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="19" cy="12" r="1.5" fill="currentColor"/></svg>',empty:'<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="14" rx="2"/><path d="M3 10h18M7 14h3"/></svg>',download:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>',upload:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21V9M7 14l5-5 5 5M5 3h14"/></svg>'};

const STORE_KEY='securevault.vault.v1',SETTINGS_KEY='securevault.settings.v1',IDLE_LOCK_MS_DEFAULT=5*60*1000;
let cryptoKey=null,vault=null,currentTab='passwords',activeCategory='all',idleTimer=null,selectedColorIdx=0,balanceHidden=false;
let settings=loadSettings();
window._activeFilter='all';

const CARD_COLORS=['#16a34a','#f97316','#22c55e','#ef4444','#2563eb','#a855f7','#0891b2','#475569','#e11d48','#0ea5e9','#ca8a04','#7c3aed'];

const PW_TEMPLATES=[{name:'Google',domain:'google.com',cat:'Personal',color:4},{name:'Gmail',domain:'gmail.com',cat:'Personal',color:3},{name:'Microsoft',domain:'microsoft.com',cat:'Work',color:4},{name:'Outlook',domain:'outlook.com',cat:'Work',color:4},{name:'Apple',domain:'apple.com',cat:'Personal',color:7},{name:'Facebook',domain:'facebook.com',cat:'Social',color:4},{name:'Instagram',domain:'instagram.com',cat:'Social',color:8},{name:'Twitter/X',domain:'x.com',cat:'Social',color:7},{name:'LinkedIn',domain:'linkedin.com',cat:'Work',color:4},{name:'GitHub',domain:'github.com',cat:'Work',color:7},{name:'Amazon',domain:'amazon.com',cat:'Shopping',color:1},{name:'Netflix',domain:'netflix.com',cat:'Entertainment',color:3},{name:'YouTube',domain:'youtube.com',cat:'Entertainment',color:3},{name:'Spotify',domain:'spotify.com',cat:'Entertainment',color:0},{name:'PayPal',domain:'paypal.com',cat:'Finance',color:4},{name:'Steam',domain:'steampowered.com',cat:'Entertainment',color:7},{name:'Dropbox',domain:'dropbox.com',cat:'Work',color:9},{name:'Slack',domain:'slack.com',cat:'Work',color:11},{name:'Discord',domain:'discord.com',cat:'Social',color:11},{name:'Reddit',domain:'reddit.com',cat:'Social',color:1}];

const SEED_TEMPLATES=[{name:'MetaMask',cat:'EVM',color:1,words:12},{name:'Trust Wallet',cat:'Multi',color:4,words:12},{name:'Ledger',cat:'Hardware',color:7,words:24},{name:'Trezor',cat:'Hardware',color:7,words:24},{name:'Phantom',cat:'Solana',color:5,words:12},{name:'Exodus',cat:'Multi',color:7,words:12},{name:'Coinbase',cat:'Multi',color:4,words:12},{name:'Bitcoin Core',cat:'Bitcoin',color:1,words:24},{name:'Keplr',cat:'Cosmos',color:7,words:24},{name:'Other',cat:'Other',color:7,words:12}];

const DEFAULT_CATEGORIES={passwords:['Personal','Work','Social','Finance','Shopping','Entertainment'],seeds:['EVM','Bitcoin','Solana','Cosmos','Multi','Hardware','Other'],notes:['Personal','Work','Finance','Other']};

const enc=new TextEncoder(),dec=new TextDecoder();
const b64={enc:a=>btoa(String.fromCharCode(...new Uint8Array(a))),dec:s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0))};
async function deriveKey(p,s){const k=await crypto.subtle.importKey('raw',enc.encode(p),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:s,iterations:250000,hash:'SHA-256'},k,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);}
async function encryptVault(o,k){const iv=crypto.getRandomValues(new Uint8Array(12));const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},k,enc.encode(JSON.stringify(o)));return{iv:b64.enc(iv),ct:b64.enc(ct)};}
async function decryptVault(p,k){const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64.dec(p.iv)},k,b64.dec(p.ct));return JSON.parse(dec.decode(pt));}

function loadStore(){try{return JSON.parse(localStorage.getItem(STORE_KEY)||'null')}catch(e){return null}}
function saveStore(s){localStorage.setItem(STORE_KEY,JSON.stringify(s))}
function loadSettings(){try{return JSON.parse(localStorage.getItem(SETTINGS_KEY))||{theme:'light',idleMs:IDLE_LOCK_MS_DEFAULT}}catch(e){return{theme:'light',idleMs:IDLE_LOCK_MS_DEFAULT}}}
function saveSettings(){localStorage.setItem(SETTINGS_KEY,JSON.stringify(settings))}

function initApp(){
  applyTheme();
  document.getElementById('lockLogo').innerHTML=ICONS.shield;
  document.getElementById('themeBtn').innerHTML=ICONS.sun;
  document.getElementById('settingsBtn').innerHTML=ICONS.settings;
  document.getElementById('lockBtn').innerHTML=ICONS.lock;
  document.getElementById('folderBtn').innerHTML=ICONS.folder;
  document.getElementById('addBtnIcon').innerHTML=ICONS.plus;
  document.getElementById('fab').innerHTML=ICONS.plus;
  document.querySelectorAll('[data-toggle]').forEach(b=>{b.innerHTML=ICONS.eye;b.addEventListener('click',()=>togglePw(b.dataset.toggle,b));});
  buildBottomNav();
  const store=loadStore();
  if(!store){
    document.getElementById('setupForm').classList.remove('hidden');
    document.getElementById('unlockForm').classList.add('hidden');
    document.getElementById('lockTitle').textContent='Welcome to SecureVault';
    document.getElementById('lockSubtitle').textContent='Create your master password to begin';
    document.getElementById('newPass').addEventListener('input',updateSetupStrength);
  }
  document.getElementById('masterPass').addEventListener('keydown',e=>{if(e.key==='Enter')unlockVault();});
  document.getElementById('newPass2').addEventListener('keydown',e=>{if(e.key==='Enter')createVault();});
  document.getElementById('importFile').addEventListener('change',handleImportFile);
  ['mousemove','keydown','touchstart','click'].forEach(ev=>window.addEventListener(ev,resetIdle,{passive:true}));
  registerInlineSW();
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',initApp);else initApp();

function registerInlineSW(){
  if(!('serviceWorker' in navigator))return;
  try{
    const swCode=`const CACHE='securevault-inline-v1';self.addEventListener('install',e=>{self.skipWaiting()});self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim())});self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(caches.match(e.request).then(c=>c||fetch(e.request).then(res=>{const copy=res.clone();caches.open(CACHE).then(cc=>{try{cc.put(e.request,copy)}catch(_){}});return res}).catch(()=>caches.match('./'))))});`;
    const blob=new Blob([swCode],{type:'application/javascript'});
    const url=URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).catch(()=>{});
  }catch(e){}
}

function resetIdle(){if(!vault)return;clearTimeout(idleTimer);idleTimer=setTimeout(lock,settings.idleMs);}

function buildBottomNav(){
  const items=[{k:'passwords',label:'Passwords',ic:ICONS.key},{k:'seeds',label:'Seeds',ic:ICONS.coin},{k:'notes',label:'Notes',ic:ICONS.note},{k:'insights',label:'Insights',ic:ICONS.chart}];
  document.getElementById('bottomNav').innerHTML=items.map(i=>`<button class="nav-item ${i.k===currentTab?'active':''}" data-tab="${i.k}" onclick="switchTab('${i.k}')">${i.ic}<span>${i.label}</span></button>`).join('');
}

function togglePw(id,btn){const el=document.getElementById(id);el.type=el.type==='password'?'text':'password';btn.innerHTML=el.type==='password'?ICONS.eye:ICONS.eyeOff;}
function updateSetupStrength(){const v=document.getElementById('newPass').value;const s=pwStrength(v);const bar=document.getElementById('setupBar');bar.style.width=(s.score*25)+'%';bar.style.background=['#dc2626','#f59e0b','#eab308','#16a34a','#16a34a'][s.score];}

async function createVault(){
  const p1=document.getElementById('newPass').value;const p2=document.getElementById('newPass2').value;
  const err=document.getElementById('setupErr');err.textContent='';
  if(p1.length<8){err.textContent='Password must be at least 8 characters.';return;}
  if(p1!==p2){err.textContent='Passwords do not match.';return;}
  const salt=crypto.getRandomValues(new Uint8Array(16));
  cryptoKey=await deriveKey(p1,salt);
  vault={passwords:[],seeds:[],notes:[],categories:JSON.parse(JSON.stringify(DEFAULT_CATEGORIES)),createdAt:Date.now()};
  saveStore({salt:b64.enc(salt),payload:await encryptVault(vault,cryptoKey),version:1});
  enterApp();
}
async function unlockVault(){
  const pw=document.getElementById('masterPass').value;const err=document.getElementById('unlockErr');err.textContent='';
  const store=loadStore();if(!store){err.textContent='No vault found.';return;}
  try{cryptoKey=await deriveKey(pw,b64.dec(store.salt));vault=await decryptVault(store.payload,cryptoKey);vault.categories=vault.categories||JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));document.getElementById('masterPass').value='';enterApp();}
  catch(e){cryptoKey=null;vault=null;err.textContent='Incorrect master password.';}
}
function enterApp(){document.getElementById('lockScreen').style.display='none';document.getElementById('app').style.display='flex';document.getElementById('bottomBar').style.display='flex';resetIdle();switchTab('passwords');}
function lock(){cryptoKey=null;vault=null;clearTimeout(idleTimer);document.getElementById('app').style.display='none';document.getElementById('bottomBar').style.display='none';document.getElementById('lockScreen').style.display='flex';document.getElementById('setupForm').classList.add('hidden');document.getElementById('unlockForm').classList.remove('hidden');closeModal();}
function resetVault(){if(!confirm('This will permanently delete your encrypted vault from this device. Continue?'))return;if(!confirm('Are you absolutely sure? This cannot be undone.'))return;localStorage.removeItem(STORE_KEY);location.reload();}
async function persist(){if(!cryptoKey||!vault)return;const store=loadStore();saveStore({salt:store.salt,payload:await encryptVault(vault,cryptoKey),version:1});}

function switchTab(tab){currentTab=tab;activeCategory='all';window._activeFilter='all';document.querySelectorAll('.nav-item').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));const isInsights=tab==='insights';document.getElementById('addBtn').style.display=isInsights?'none':'inline-flex';document.getElementById('fab').style.display=isInsights?'none':'flex';render();}

const TAB_META={passwords:{title:'Passwords',sub:'Manage your accounts and credentials'},seeds:{title:'Seed Phrases',sub:'Crypto wallet recovery phrases'},notes:{title:'Secure Notes',sub:'Encrypted private notes'},insights:{title:'Insights',sub:'Security overview of your vault'}};

function render(){if(!vault)return;document.getElementById('pageTitle').textContent=TAB_META[currentTab].title;document.getElementById('pageSub').textContent=TAB_META[currentTab].sub;const pills=document.getElementById('filterPills');if(currentTab==='insights'){pills.innerHTML='';renderInsights();return;}pills.innerHTML=renderFilterPills();renderItemsView();}

function renderFilterPills(){const filters=currentTab==='passwords'?[['all','All'],['strong','Strong'],['weak','Weak']]:[['all','All'],['recent','Recent']];return filters.map(([k,l])=>`<button class="pill ${window._activeFilter===k?'active':''}" onclick="setFilter('${k}')">${l}</button>`).join('');}
function setFilter(k){window._activeFilter=k;render();}

function renderItemsView(){
  const c=document.getElementById('mainContainer');const items=vault[currentTab]||[];
  c.innerHTML=`${heroCardHtml()}${(currentTab==='passwords'&&items.length>=1)?insightStripHtml():''}<div class="search">${ICONS.search}<input id="search" type="search" placeholder="Search ${currentTab}..." oninput="renderList()" /></div><div id="categoryChips" class="chips"></div><div class="section-head"><div class="t">All ${cap(currentTab)}</div><div class="a">${items.length} items</div></div><div id="listArea"></div>`;
  renderCategories();renderList();
}

function heroCardHtml(){
  const pwCount=vault.passwords.length,seedCount=vault.seeds.length,noteCount=vault.notes.length,tabCount=vault[currentTab].length;
  const eyeIcon=balanceHidden?ICONS.eyeOff:ICONS.eye;
  return `<div class="hero-card"><div class="lab">${currentTab.toUpperCase()} IN VAULT</div><div class="big"><span>${balanceHidden?'••••':tabCount}</span><span class="eye" onclick="balanceHidden=!balanceHidden;render()">${eyeIcon}</span></div><div class="sub">${pwCount} passwords · ${seedCount} seeds · ${noteCount} notes</div></div>`;
}

function insightStripHtml(){
  const pws=vault.passwords,total=pws.length;
  const scores=pws.map(p=>pwStrength(p.password||'').score);
  const strong=scores.filter(s=>s>=3).length,weak=scores.filter(s=>s<=1).length;
  const seen={},dupes=new Set();
  pws.forEach(p=>{if(!p.password)return;if(seen[p.password])dupes.add(p.password);else seen[p.password]=true;});
  const dupCount=pws.filter(p=>dupes.has(p.password)).length;
  const health=total===0?0:Math.round(Math.max(0,Math.min(100,(scores.reduce((a,b)=>a+b,0)/(total*4))*100-(dupCount/total)*20)));
  const days=['M','T','W','T','F','S','S'];
  const now=new Date(),mon=new Date(now);mon.setHours(0,0,0,0);mon.setDate(now.getDate()-((now.getDay()+6)%7));
  const week=[0,0,0,0,0,0,0];
  [...pws,...vault.seeds,...vault.notes].forEach(it=>{if(!it.updatedAt)return;const d=new Date(it.updatedAt);const diff=Math.floor((d-mon)/(24*60*60*1000));if(diff>=0&&diff<7)week[diff]++;});
  const maxW=Math.max(1,...week);const todayIdx=(new Date().getDay()+6)%7;
  let message;
  if(total===0)message=`<b>Your vault is empty.</b> Tap <b>Add</b> to save your first password.`;
  else if(health>=80)message=`<b>${health}% vault health.</b> Excellent — most of your passwords are strong and unique.`;
  else if(weak>0)message=`<b>${weak} weak ${weak===1?'password':'passwords'}.</b> Consider replacing them with stronger ones.`;
  else if(dupCount>0)message=`<b>${dupCount} reused passwords.</b> Unique passwords are critical for security.`;
  else message=`<b>${total} items secured.</b> Keep growing your encrypted vault.`;
  return `<div class="insight-row"><div class="insight-card"><div class="quote">"</div><div class="insight-head"><div class="t">INSIGHT</div><div class="link" onclick="switchTab('insights')">View all ${ICONS.chevR}</div></div><div class="insight-body">${message}</div></div><div class="daily-card"><div class="t">WEEKLY ACTIVITY</div><div class="mini-bars">${week.map((v,i)=>`<div class="mini-bar ${i===todayIdx?'active':''}"><div class="mb" style="height:${Math.max(8,(v/maxW)*100)}%"></div></div>`).join('')}</div><div class="mini-labels">${days.map(d=>`<span>${d}</span>`).join('')}</div></div></div>`;
}

function renderCategories(){const cats=['all',...(vault.categories[currentTab]||[])];document.getElementById('categoryChips').innerHTML=cats.map(c=>`<button class="chip ${c===activeCategory?'active':''}" onclick="setCategory(${JSON.stringify(c)})">${c==='all'?'All':escapeHtml(c)}</button>`).join('');}
function setCategory(c){activeCategory=c;renderList();renderCategories();}

function renderList(){
  const q=(document.getElementById('search')||{}).value?.trim().toLowerCase()||'';
  let list=(vault[currentTab]||[]).filter(item=>{if(activeCategory!=='all'&&item.category!==activeCategory)return false;if(!q)return true;return JSON.stringify(item).toLowerCase().includes(q);});
  if(currentTab==='passwords'){if(window._activeFilter==='strong')list=list.filter(p=>pwStrength(p.password||'').score>=3);else if(window._activeFilter==='weak')list=list.filter(p=>pwStrength(p.password||'').score<=1);}
  else if(window._activeFilter==='recent')list=[...list].sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
  const area=document.getElementById('listArea');
  if(!list.length){area.innerHTML=`<div class="empty">${ICONS.empty}<div class="t">No ${currentTab} yet</div><div class="small">Tap the + button to add one</div></div>`;return;}
  area.innerHTML=`<div class="grid">${list.map(renderCard).join('')}</div>`;
}

function renderCard(item){if(currentTab==='passwords')return renderPwCard(item);if(currentTab==='seeds')return renderSeedCard(item);return renderNoteCard(item);}
function cardBg(item){const ci=(typeof item.color==='number')?item.color:0;return CARD_COLORS[ci%CARD_COLORS.length];}

function renderPwCard(p){

function renderSeedCard(s){
  return `<div class="card" style="background:${cardBg(s)}"><div class="top">${faviconHtml(s,true)}<div class="name">${escapeHtml(s.name||'Untitled Wallet')}</div><button class="menu" onclick='openEditor(${JSON.stringify(s.id)})'>${ICONS.more}</button></div><div class="sub">${escapeHtml(s.network||'—')}${s.category?' · '+escapeHtml(s.category):''}</div><div class="label">PHRASE</div><div style="font-size:20px;font-weight:800;letter-spacing:-.4px">${(s.words||[]).length} words</div><div class="card-actions"><button class="act" onclick='revealSeed(${JSON.stringify(s.id)})'>${ICONS.eye} Reveal</button><button class="act" onclick='openEditor(${JSON.stringify(s.id)})'>${ICONS.edit} Edit</button></div></div>`;
}

function renderNoteCard(n){
  const preview=(n.content||'').slice(0,80);
  return `<div class="card" style="background:${cardBg(n)}"><div class="top"><div class="favicon">${ICONS.note}</div><div class="name">${escapeHtml(n.name||'Untitled')}</div><button class="menu" onclick='openEditor(${JSON.stringify(n.id)})'>${ICONS.more}</button></div><div class="sub">${escapeHtml(preview)}${(n.content||'').length>80?'…':''}</div><div class="label">CATEGORY</div><div style="font-size:14px;font-weight:700">${escapeHtml(n.category||'—')}</div><div class="card-actions"><button class="act" onclick='openEditor(${JSON.stringify(n.id)})'>${ICONS.edit} Edit</button><button class="act" onclick='deleteItem(${JSON.stringify(n.id)})'>${ICONS.trash}</button></div></div>`;

function faviconHtml(item,isSeed=false){
  const initials=(item.name||'?').split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase();
  if(item.url&&!isSeed){try{const u=new URL(item.url.startsWith('http')?item.url:'https://'+item.url);const src='https://www.google.com/s2/favicons?sz=64&domain='+u.hostname;return `<div class="favicon" style="background:#fff;color:#0f1a14"><img src="${src}" onerror="this.parentNode.textContent='${initials}'" /></div>`;}catch(e){}}
  return `<div class="favicon">${initials}</div>`;
}

function renderInsights(){
  const pws=vault.passwords,total=pws.length;
  const scores=pws.map(p=>pwStrength(p.password||'').score);
  const strong=scores.filter(s=>s>=3).length,weak=scores.filter(s=>s<=1).length;
  const seen={},dupes=new Set();
  pws.forEach(p=>{if(!p.password)return;if(seen[p.password])dupes.add(p.password);else seen[p.password]=true;});
  const dupCount=pws.filter(p=>dupes.has(p.password)).length;
  const avgLen=total?Math.round(pws.reduce((a,p)=>a+(p.password||'').length,0)/total):0;
  const health=total===0?0:Math.round(Math.max(0,Math.min(100,(scores.reduce((a,b)=>a+b,0)/(total*4))*100-(dupCount/total)*20)));
  const counts={};pws.forEach(p=>{const k=p.category||'Other';counts[k]=(counts[k]||0)+1;});
  const catEntries=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const now=new Date(),mon=new Date(now);mon.setHours(0,0,0,0);mon.setDate(now.getDate()-((now.getDay()+6)%7));
  const week=[0,0,0,0,0,0,0];
  [...pws,...vault.seeds,...vault.notes].forEach(it=>{if(!it.updatedAt)return;const d=new Date(it.updatedAt);const diff=Math.floor((d-mon)/(24*60*60*1000));if(diff>=0&&diff<7)week[diff]++;});
  const maxWeek=Math.max(1,...week);
  document.getElementById('mainContainer').innerHTML=`<div class="hero-card"><div class="lab">VAULT HEALTH</div><div class="big">${health}<span style="font-size:18px;color:var(--muted);margin-left:4px">/ 100</span></div><div class="sub">Based on strength, uniqueness and coverage</div></div><div class="stat-grid"><div class="stat-card up"><div class="l">Strong</div><div class="v">${strong}</div><div class="d">Healthy</div></div><div class="stat-card ${weak?'down':'up'}"><div class="l">Weak</div><div class="v">${weak}</div><div class="d">${weak?'Needs attention':'All good'}</div></div><div class="stat-card ${dupCount?'down':'up'}"><div class="l">Reused</div><div class="v">${dupCount}</div><div class="d">${dupCount?'Duplicates':'Unique'}</div></div><div class="stat-card up"><div class="l">Avg Length</div><div class="v">${avgLen}</div><div class="d">chars</div></div></div><div class="insight-block"><div class="ihead"><div class="t">Distribution by Category</div></div><div class="donut-wrap">${donutSvg(catEntries)}<div class="legend">${catEntries.length?catEntries.map(([k,v],i)=>{const pct=Math.round(v/total*100);return `<div class="legend-item"><span class="dot" style="background:${DONUT_COLORS[i%DONUT_COLORS.length]}"></span><span>${escapeHtml(k)}</span><span class="val">${v} · ${pct}%</span></div>`;}).join(''):`<div class="small">No passwords yet</div>`}</div></div></div><div class="insight-block"><div class="ihead"><div class="t">Activity This Week</div><div class="small">Items added/updated</div></div><div class="bars-wrap"><div class="bars">${week.map((v,i)=>`<div class="bar"><div class="fill" style="height:${(v/maxWeek)*100}%"></div><div class="lab">${days[i]}</div></div>`).join('')}</div></div></div><div class="insight-block"><div class="ihead"><div class="t">Strength Breakdown</div></div>${['Very weak','Weak','Fair','Strong','Excellent'].map((lab,i)=>{const cnt=scores.filter(s=>s===i).length;const pct=total?Math.round(cnt/total*100):0;const col=['#dc2626','#f59e0b','#eab308','#16a34a','#16a34a'][i];return `<div class="strength-row-i"><div class="top"><span>${lab}</span><span><b>${cnt}</b> · ${pct}%</span></div><div class="bar2"><span style="width:${pct}%;background:${col}"></span></div></div>`;}).join('')}</div>`;
}

const DONUT_COLORS=['#16a34a','#22c55e','#f59e0b','#ef4444','#a855f7','#0891b2','#e11d48','#475569'];
function donutSvg(entries){
  const total=entries.reduce((a,b)=>a+b[1],0)||1;let acc=0;const R=60,C=2*Math.PI*R;let segs='';
  entries.forEach(([k,v],i)=>{const frac=v/total;const dash=frac*C,gap=C-dash;segs+=`<circle cx="80" cy="80" r="${R}" fill="none" stroke="${DONUT_COLORS[i%DONUT_COLORS.length]}" stroke-width="20" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-acc*C}" transform="rotate(-90 80 80)" />`;acc+=frac;});
  return `<svg class="donut" viewBox="0 0 160 160"><circle cx="80" cy="80" r="${R}" fill="none" stroke="var(--surface-2)" stroke-width="20" />${segs}<text x="80" y="76" text-anchor="middle" font-size="22" font-weight="800" fill="var(--text)">${total}</text><text x="80" y="96" text-anchor="middle" font-size="11" fill="var(--muted)">Total</text></svg>`;
}

function newId(){return 'i_'+Math.random().toString(36).slice(2,10)+Date.now().toString(36);}
function openEditor(id){if(currentTab==='insights')return;if(currentTab==='passwords')openPwEditor(id);else if(currentTab==='seeds')openSeedEditor(id);else openNoteEditor(id);}
function colorSwatchesHtml(currentIdx){return CARD_COLORS.map((c,i)=>`<button type="button" class="swatch ${i===(currentIdx||0)?'active':''}" style="background:${c}" onclick="selectColor(${i})"></button>`).join('');}
function selectColor(i){selectedColorIdx=i;document.querySelectorAll('.swatch').forEach((el,idx)=>el.classList.toggle('active',idx===i));}

function openPwEditor(id){
  const item=id?vault.passwords.find(x=>x.id===id):null;const isNew=!item;const cats=vault.categories.passwords;
  const data=item||{id:newId(),name:'',url:'',username:'',password:'',notes:'',category:cats[0]||'',tags:[],color:0};
  selectedColorIdx=data.color||0;
  showSheet(`<div class="sheet-handle"></div><h2>${isNew?'Add Password':'Edit Password'}</h2>${isNew?`<div class="small" style="margin-bottom:8px;font-weight:700;color:var(--text)">Quick Templates</div><div class="tpl-grid">${PW_TEMPLATES.map((t,i)=>`<button type="button" class="tpl" onclick='applyPwTemplate(${i})'><div class="favicon"><img src="https://www.google.com/s2/favicons?sz=64&domain=${t.domain}" onerror="this.parentNode.textContent='${t.name[0]}'" /></div><div class="name">${t.name}</div></button>`).join('')}</div>`:''}<div class="field"><label>Name *</label><div class="input"><input id="f_name" value="${escapeAttr(data.name)}" placeholder="e.g. Gmail" /></div></div><div class="field"><label>Website / URL</label><div class="input"><input id="f_url" value="${escapeAttr(data.url)}" placeholder="example.com" /></div></div><div class="grid2"><div class="field"><label>Username / Email</label><div class="input"><input id="f_user" value="${escapeAttr(data.username)}" autocomplete="off" /></div></div><div class="field"><label>Category</label><div class="input"><select id="f_cat">${cats.map(c=>`<option ${c===data.category?'selected':''}>${escapeHtml(c)}</option>`).join('')}</select></div></div></div><div class="field"><label>Password *</label><div class="input"><input id="f_pass" type="password" value="${escapeAttr(data.password)}" autocomplete="new-password" /><button class="iconbtn" type="button" id="f_pass_toggle">${ICONS.eye}</button><button class="iconbtn" type="button" onclick="document.getElementById('f_pass').value=genPasswordDefault();updatePwStrength()">${ICONS.dice}</button></div><div style="height:6px;border-radius:4px;background:var(--surface-2);overflow:hidden;margin-top:6px"><span id="f_strength" style="display:block;height:100%;width:0;background:var(--danger);transition:.2s"></span></div></div><div class="field"><label>Card Color</label><div class="color-row">${colorSwatchesHtml(data.color||0)}</div></div><div class="field"><label>Tags (comma separated)</label><div class="input"><input id="f_tags" value="${escapeAttr((data.tags||[]).join(', '))}" placeholder="work, finance" /></div></div><div class="field"><label>Notes</label><div class="input"><textarea id="f_notes" rows="3">${escapeHtml(data.notes||'')}</textarea></div></div><div class="row" style="justify-content:space-between;margin-top:8px">${!isNew?`<button class="btn danger" onclick='deleteItem(${JSON.stringify(data.id)})'>${ICONS.trash} Delete</button>`:'<span></span>'}<div class="row"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick='savePassword(${JSON.stringify(data.id)}, ${isNew})'>Save</button></div></div>`);
  document.getElementById('f_pass').addEventListener('input',updatePwStrength);
  document.getElementById('f_pass_toggle').addEventListener('click',e=>togglePw('f_pass',e.currentTarget));
  updatePwStrength();
}
function updatePwStrength(){const v=document.getElementById('f_pass').value;const s=pwStrength(v);const bar=document.getElementById('f_strength');bar.style.width=(s.score*25)+'%';bar.style.background=['#dc2626','#f59e0b','#eab308','#16a34a','#16a34a'][s.score];}
function applyPwTemplate(i){const t=PW_TEMPLATES[i];document.getElementById('f_name').value=t.name;document.getElementById('f_url').value=t.domain;const sel=document.getElementById('f_cat');if(!Array.from(sel.options).some(o=>o.value===t.cat)){const opt=document.createElement('option');opt.value=opt.text=t.cat;sel.appendChild(opt);if(!vault.categories.passwords.includes(t.cat))vault.categories.passwords.push(t.cat);}sel.value=t.cat;selectColor(t.color);}

async function savePassword(id,isNew){
  const item={id,type:'password',name:document.getElementById('f_name').value.trim(),url:document.getElementById('f_url').value.trim(),username:document.getElementById('f_user').value.trim(),password:document.getElementById('f_pass').value,category:document.getElementById('f_cat').value,color:selectedColorIdx,tags:document.getElementById('f_tags').value.split(',').map(s=>s.trim()).filter(Boolean),notes:document.getElementById('f_notes').value,updatedAt:Date.now()};
  if(!item.name||!item.password){toast('Name and password are required');return;}
  if(isNew)vault.passwords.unshift(item);else{const idx=vault.passwords.findIndex(x=>x.id===id);vault.passwords[idx]={...vault.passwords[idx],...item};}
  await persist();closeModal();render();toast('Saved');
}

function openSeedEditor(id){
  const item=id?vault.seeds.find(x=>x.id===id):null;const isNew=!item;const cats=vault.categories.seeds;

 id="f_pass_toggle">${ICONS.eye}</button></div></div><div class="field"><label>Card Color</label><div class="color-row">${colorSwatchesHtml(data.color||0)}</div></div><div class="field"><label>Tags</label><div class="input"><input id="f_tags" value="${escapeAttr((data.tags||[]).join(', '))}" placeholder="cold, main, defi" /></div></div><div class="field"><label>Notes</label><div class="input"><textarea id="f_notes" rows="2">${escapeHtml(data.notes||'')}</textarea></div></div><div class="row" style="justify-content:space-between;margin-top:8px">${!isNew?`<button class="btn danger" onclick='deleteItem(${JSON.stringify(data.id)})'>${ICONS.trash} Delete</button>`:'<span></span>'}<div class="row"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick='saveSeed(${JSON.stringify(data.id)}, ${isNew})'>Save</button></div></div>`);
  renderSeedGrid(data.words);
  document.getElementById('f_pass_toggle').addEventListener('click',e=>togglePw('f_pass',e.currentTarget));
}
function renderSeedGrid(words){document.getElementById('seedGrid').innerHTML=words.map((w,i)=>`<div class="seed-word"><span class="num">${i+1}</span><input type="password" value="${escapeAttr(w)}" data-i="${i}" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" /></div>`).join('');}
function resizeSeed(){const len=parseInt(document.getElementById('f_len').value,10);const current=Array.from(document.querySelectorAll('#seedGrid input')).map(i=>i.value);renderSeedGrid(Array(len).fill('').map((_,i)=>current[i]||''));}
function applySeedTemplate(i){const t=SEED_TEMPLATES[i];document.getElementById('f_name').value=t.name;document.getElementById('f_len').value=String(t.words);resizeSeed();const sel=document.getElementById('f_cat');if(!Array.from(sel.options).some(o=>o.value===t.cat)){const opt=document.createElement('option');opt.value=opt.text=t.cat;sel.appendChild(opt);if(!vault.categories.seeds.includes(t.cat))vault.categories.seeds.push(t.cat);}sel.value=t.cat;selectColor(t.color);}
async function pasteSeed(){try{const text=await navigator.clipboard.readText();const words=text.trim().split(/\s+/);const len=words.length;if(![12,15,18,21,24].includes(len)){if(!confirm(`Detected ${len} words. BIP-39 expects 12/15/18/21/24. Paste anyway?`))return;}else{document.getElementById('f_len').value=String(len);}renderSeedGrid(words);toast(`${words.length} words pasted`);}catch(e){toast('Clipboard unavailable');}}

async function saveSeed(id,isNew){
  const words=Array.from(document.querySelectorAll('#seedGrid input')).map(i=>i.value.trim().toLowerCase());
  const item={id,type:'seed',name:document.getElementById('f_name').value.trim(),network:document.getElementById('f_net').value.trim(),category:document.getElementById('f_cat').value,color:selectedColorIdx,words,passphrase:document.getElementById('f_pass').value,tags:document.getElementById('f_tags').value.split(',').map(s=>s.trim()).filter(Boolean),notes:document.getElementById('f_notes').value,updatedAt:Date.now()};
  if(!item.name){toast('Wallet name required');return;}
  if(words.some(w=>!w)){if(!confirm('Some seed words are empty. Save anyway?'))return;}
  if(isNew)vault.seeds.unshift(item);else{const idx=vault.seeds.findIndex(x=>x.id===id);vault.seeds[idx]={...vault.seeds[idx],...item};}
  await persist();closeModal();render();toast('Saved');
}
function revealSeed(id){const s=vault.seeds.find(x=>x.id===id);if(!s)return;showSheet(`<div class="sheet-handle"></div><h2>${escapeHtml(s.name)}</h2><p class="small">Never share these words. Anyone with them controls your wallet.</p><div class="seed-grid" style="margin:10px 0">${s.words.map((w,i)=>`<div class="seed-word"><span class="num">${i+1}</span><div style="flex:1;font-weight:600">${escapeHtml(w)}</div></div>`).join('')}</div>${s.passphrase?`<div class="field"><label>Passphrase</label><div class="input"><div style="flex:1">${escapeHtml(s.passphrase)}</div></div></div>`:''}<div class="row" style="justify-content:space-between"><button class="btn" onclick="navigator.clipboard.writeText(${JSON.stringify(s.words.join(' '))}).then(()=>toast('Copied (clears in 30s)'));setTimeout(()=>navigator.clipboard.writeText(''),30000)">${ICONS.copy} Copy phrase</button><button class="btn primary" onclick="closeModal()">Close</button></div>`);}

function openNoteEditor(id){
  const item=id?vault.notes.find(x=>x.id===id):null;const isNew=!item;const cats=vault.categories.notes;
  const data=item||{id:newId(),name:'',content:'',category:cats[0]||'',tags:[],color:0};
  selectedColorIdx=data.color||0;
  showSheet(`<div class="sheet-handle"></div><h2>${isNew?'Add Secure Note':'Edit Secure Note'}</h2><div class="field"><label>Title *</label><div class="input"><input id="f_name" value="${escapeAttr(data.name)}" /></div></div><div class="grid2"><div class="field"><label>Category</label><div class="input"><select id="f_cat">${cats.map(c=>`<option ${c===data.category?'selected':''}>${escapeHtml(c)}</option>`).join('')}</select></div></div><div class="field"><label>Tags</label><div class="input"><input id="f_tags" value="${escapeAttr((data.tags||[]).join(', '))}" /></div></div></div><div class="field"><label>Content</label><div class="input"><textarea id="f_content" rows="8">${escapeHtml(data.content||'')}</textarea></div></div><div class="field"><label>Card Color</label><div class="color-row">${colorSwatchesHtml(data.color||0)}</div></div><div class="row" style="justify-content:space-between;margin-top:8px">${!isNew?`<button class="btn danger" onclick='deleteItem(${JSON.stringify(data.id)})'>${ICONS.trash} Delete</button>`:'<span></span>'}<div class="row"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick='saveNote(${JSON.stringify(data.id)}, ${isNew})'>Save</button></div></div>`);
}
async function saveNote(id,isNew){
  const item={id,type:'note',name:document.getElementById('f_name').value.trim(),category:document.getElementById('f_cat').value,color:selectedColorIdx,tags:document.getElementById('f_tags').value.split(',').map(s=>s.trim()).filter(Boolean),content:document.getElementById('f_content').value,updatedAt:Date.now()};
  if(!item.name){toast('Title required');return;}
  if(isNew)vault.notes.unshift(item);else{const idx=vault.notes.findIndex(x=>x.id===id);vault.notes[idx]={...vault.notes[idx],...item};}
  await persist();closeModal();render();toast('Saved');
}

async function copyField(id,field){const item=vault.passwords.find(x=>x.id===id);if(!item)return;await navigator.clipboard.writeText(item[field]||'');toast(field==='password'?'Password copied (clears in 30s)':'Copied');if(field==='password')setTimeout(()=>navigator.clipboard.writeText(''),30000);}
function openUrl(url){const u=url.startsWith('http')?url:'https://'+url;window.open(u,'_blank','noopener,noreferrer');}
async function deleteItem(id){if(!confirm('Delete this item?'))return;vault[currentTab]=vault[currentTab].filter(x=>x.id!==id);await persist();closeModal();render();toast('Deleted');}

function pwStrength(pw){if(!pw)return{score:0,label:'Empty'};let s=0;if(pw.length>=8)s++;if(pw.length>=12)s++;if(/[A-Z]/.test(pw)&&/[a-z]/.test(pw))s++;if(/\d/.test(pw)&&/[^\w\s]/.test(pw))s++;if(pw.length>=16)s=Math.max(s,4);return{score:Math.min(s,4),label:['Very weak','Weak','Fair','Strong','Excellent'][Math.min(s,4)]};}

function genPassword({len=20,upper=true,lower=true,digits=true,symbols=true,ambiguous=false}={}){
  let chars='';
  if(lower)chars+='abcdefghijkmnopqrstuvwxyz'+(ambiguous?'l':'');
  if(upper)chars+='ABCDEFGHJKLMNPQRSTUVWXYZ'+(ambiguous?'IO':'');
  if(digits)chars+='23456789'+(ambiguous?'01':'');
  if(symbols)chars+='!@#$%^&*()-_=+[]{};:,.?';
  if(!chars)chars='abcdefghijklmnopqrstuvwxyz';
  const arr=new Uint32Array(len);crypto.getRandomValues(arr);
  let out='';for(let i=0;i<len;i++)out+=chars[arr[i]%chars.length];return out;
}
function genPasswordDefault(){return genPassword({len:20});}
function openGenerator(){showSheet(`<div class="sheet-handle"></div><h2>Password Generator</h2><div class="gen"><div class="input"><input id="g_out" value="${genPasswordDefault()}" /><button class="iconbtn" type="button" onclick="document.getElementById('g_out').value=genCurrent()">${ICONS.refresh}</button><button class="iconbtn" type="button" onclick="navigator.clipboard.writeText(document.getElementById('g_out').value).then(()=>toast('Copied'))">${ICONS.copy}</button></div><div class="row-opts"><label>Length <input id="g_len" type="number" min="6" max="64" value="20" style="width:60px" oninput="document.getElementById('g_out').value=genCurrent()"></label><label><input type="checkbox" id="g_up" checked onchange="document.getElementById('g_out').value=genCurrent()"> Upper</label><label><input type="checkbox" id="g_lo" checked onchange="document.getElementById('g_out').value=genCurrent()"> Lower</label><label><input type="checkbox" id="g_di" checked onchange="document.getElementById('g_out').value=genCurrent()"> Digits</label><label><input type="checkbox" id="g_sy" checked onchange="document.getElementById('g_out').value=genCurrent()"> Symbols</label><label><input type="checkbox" id="g_am" onchange="document.getElementById('g_out').value=genCurrent()"> Allow ambiguous</label></div></div><div class="row" style="justify-content:flex-end"><button class="btn primary" onclick="closeModal()">Close</button></div>`);}
function genCurrent(){return genPassword({len:parseInt(document.getElementById('g_len').value,10)||20,upper:document.getElementById('g_up').checked,lower:document.getElementById('g_lo').checked,digits:document.getElementById('g_di').checked,symbols:document.getElementById('g_sy').checked,ambiguous:document.getElementById('g_am').checked});}

function openSettings(){
  const counts={p:vault?.passwords.length||0,s:vault?.seeds.length||0,n:vault?.notes.length||0};
  showSheet(`<div class="sheet-handle"></div><h2>Settings</h2><div class="hero-card" style="margin-bottom:14px"><div class="lab">VAULT STATS</div><div class="big" style="font-size:24px">${counts.p+counts.s+counts.n}</div><div class="sub">${counts.p} passwords · ${counts.s} seeds · ${counts.n} notes</div></div><div class="field"><label>Auto-lock after (minutes)</label><div class="input"><input id="s_idle" type="number" min="1" max="60" value="${Math.round(settings.idleMs/60000)}" /><button class="btn mini" onclick="settings.idleMs=Math.max(60000,parseInt(document.getElementById('s_idle').value,10)*60000);saveSettings();resetIdle();toast('Saved')">Save</button></div></div><div class="field"><label>Password Generator</label><button class="btn" onclick="openGenerator()">${ICONS.dice} Open Generator</button></div><div class="field"><label>Manage categories</label><div class="input"><select id="s_tab_cat"><option value="passwords">Passwords</option><option value="seeds">Seed Phrases</option><option value="notes">Notes</option></select><input id="s_new_cat" placeholder="New category" /><button class="btn mini" onclick="addCategory()">Add</button></div><div id="catList" class="row" style="margin-top:8px"></div></div><div class="field"><label>Change master password</label><div class="input"><input id="s_old" type="password" placeholder="Current password" /></div><div class="input" style="margin-top:6px"><input id="s_new" type="password" placeholder="New password" /></div><button class="btn" style="margin-top:8px" onclick="changeMaster()">${ICONS.key} Change Password</button></div><div class="row" style="margin-top:14px;flex-wrap:wrap"><button class="btn" onclick="exportEncrypted()">${ICONS.download} Encrypted backup</button><button class="btn" onclick="exportPlain()">${ICONS.download} Plain JSON</button><button class="btn" onclick="document.getElementById('importFile').click()">${ICONS.upload} Import</button></div><p class="small" style="margin-top:8px">Encrypted backups can only be opened by SecureVault with your master password.</p><div class="row" style="justify-content:flex-end;margin-top:10px"><button class="btn primary" onclick="closeModal()">Close</button></div>`);
  refreshCatList();document.getElementById('s_tab_cat').addEventListener('change',refreshCatList);
}
function refreshCatList(){const tab=document.getElementById('s_tab_cat').value;const list=vault.categories[tab]||[];document.getElementById('catList').innerHTML=list.map(c=>`<span class="tag cat" style="padding:6px 12px;display:inline-flex;align-items:center;gap:6px">${escapeHtml(c)}<button class="iconbtn" style="padding:0 4px" onclick='removeCategory(${JSON.stringify(tab)}, ${JSON.stringify(c)})'>×</button></span>`).join('');}
async function addCategory(){const tab=document.getElementById('s_tab_cat').value;const name=document.getElementById('s_new_cat').value.trim();if(!name)return;if(!vault.categories[tab].includes(name))vault.categories[tab].push(name);document.getElementById('s_new_cat').value='';await persist();refreshCatList();render();}
async function removeCategory(tab,name){vault.categories[tab]=vault.categories[tab].filter(c=>c!==name);await persist();refreshCatList();render();}
async function changeMaster(){const oldPw=document.getElementById('s_old').value;const newPw=document.getElementById('s_new').value;if(newPw.length<8){toast('New password must be 8+ chars');return;}const store=loadStore();try{const oldKey=await deriveKey(oldPw,b64.dec(store.salt));await decryptVault(store.payload,oldKey);}catch(e){toast('Current password incorrect');return;}const newSalt=crypto.getRandomValues(new Uint8Array(16));cryptoKey=await deriveKey(newPw,newSalt);saveStore({salt:b64.enc(newSalt),payload:await encryptVault(vault,cryptoKey),version:1});toast('Master password changed');closeModal();}
function exportEncrypted(){const store=loadStore();downloadFile('securevault-backup-'+ts()+'.json',JSON.stringify({app:'SecureVault',encrypted:true,...store},null,2));}
function exportPlain(){if(!confirm('Plain export is NOT encrypted. Continue?'))return;downloadFile('securevault-plain-'+ts()+'.json',JSON.stringify({app:'SecureVault',encrypted:false,vault},null,2));}
function importVault(){document.getElementById('importFile').click();}
async function handleImportFile(e){const file=e.target.files[0];e.target.value='';if(!file)return;try{const data=JSON.parse(await file.text());if(data.encrypted){saveStore({salt:data.salt,payload:data.payload,version:1});toast('Encrypted backup imported. Unlock with its master password.');setTimeout(()=>location.reload(),1000);}else if(data.vault&&!cryptoKey){toast('Unlock or create a vault first to import plain JSON.');}else if(data.vault&&cryptoKey){['passwords','seeds','notes'].forEach(k=>{(data.vault[k]||[]).forEach(item=>{item.id=newId();vault[k].unshift(item);});});Object.keys(data.vault.categories||{}).forEach(k=>{(data.vault.categories[k]||[]).forEach(c=>{if(!vault.categories[k].includes(c))vault.categories[k].push(c);});});await persist();render();toast('Imported');}else toast('Unrecognized file');}catch(e){toast('Import failed: '+e.message);}}
function downloadFile(name,content){const blob=new Blob([content],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},100);}

function applyTheme(){document.documentElement.setAttribute('data-theme',settings.theme==='dark'?'dark':'');document.querySelector('meta[name="theme-color"]').setAttribute('content',settings.theme==='dark'?'#0d1411':'#16a34a');}
function toggleTheme(){settings.theme=settings.theme==='dark'?'light':'dark';saveSettings();applyTheme();}

function showSheet(html){document.getElementById('sheet').innerHTML=html;document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
let toastTimer;function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2000);}

function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function escapeAttr(s){return escapeHtml(s);}
function ts(){return new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');}
</script>
